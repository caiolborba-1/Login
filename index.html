<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<body  class="d-flex justify-content-center align-items-center">
    <div class="shadow p-3 mb-5 bg-body-tertiary rounded">
        <div class="container">
            <h2 id="titulo">Login</h2>
            <form id="form-login">

                <div id="email" classe="conjunto"><p></p>
                    <label for="email">Email</label><p>
                    <input type="email" id="email" placeholder="senha" Required>
                </div>

                <div id="senha" classe="conjunto"><p></p>
                    <label for="senha">senha:</label><p>
                    <input type="passaword" id="senha" placeholder="senha" required>
                </div>

                <button type="submit" id="button" class="btn btn-primary" >Enviar</button>
            </form>

            <div id="mensagem"></div>

            <div class="toggle" id="toggle"><br>
                <p>Não tem conta? Cadastre-se!</p>
            </div>
        </div>
    </div>

    <footer>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

    <script src="script.js"></script>
</body>

</html>
